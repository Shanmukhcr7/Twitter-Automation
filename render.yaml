services:
  - type: worker
    name: twitter-viral-automation
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m scheduler.task_scheduler
    envVars:
      # DO NOT PUT REAL SECRETS HERE.
      # Create these as Secret Variables directly in the Render Dashboard during deployment.
      - key: TWITTER_API_KEY
        sync: false
      - key: TWITTER_API_SECRET
        sync: false
      - key: TWITTER_ACCESS_TOKEN
        sync: false
      - key: TWITTER_ACCESS_SECRET
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: UNSPLASH_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.10.0" # Match your desired Python version
